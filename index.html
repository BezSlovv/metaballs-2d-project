<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaballs 2D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-top">
                    <img src="assets/university-logo.svg" alt="University logo" class="university-logo">
                </div>

                <h1>Metaballs 2D</h1>
                <p>Marching Squares · scalar field · animation</p>
            </div>

            <section class="card">
                <h2>Parameters</h2>

                <div class="control-group">
                    <label for="threshold-slider">Threshold <span id="threshold-value">0.5</span></label>
                    <input id="threshold-slider" type="range" min="0.5" max="4.5" step="0.1" value="0.5">
                </div>

                <div class="control-group">
                    <label for="grid-slider">Grid size <span id="grid-value">10</span></label>
                    <input id="grid-slider" type="range" min="10" max="40" step="2" value="10">
                </div>

                <div class="control-group">
                    <label for="ball-slider">Ball count <span id="ball-value">5</span></label>
                    <input id="ball-slider" type="range" min="1" max="20" step="1" value="5">
                </div>

                <div class="control-group">
                    <label for="speed-slider">Speed <span id="speed-value">1.0</span></label>
                    <input id="speed-slider" type="range" min="0.2" max="3.0" step="0.1" value="1.0">
                </div>

                <div class="control-group">
                    <label for="strength-slider">Source intensity <span id="strength-value">1.5</span></label>
                    <input id="strength-slider" type="range" min="0.4" max="2.5" step="0.1" value="1.5">
                </div>
            </section>

            <section class="card">
                <h2>View</h2>

                <label class="checkbox-row">
                    <input id="show-grid" type="checkbox">
                    <span>Grid</span>
                </label>

                <label class="checkbox-row">
                    <input id="show-field-points" type="checkbox">
                    <span>Field points</span>
                </label>

                <label class="checkbox-row">
                    <input id="show-scalar-background" type="checkbox" checked>
                    <span>Scalar background</span>
                </label>

                <label class="checkbox-row">
                    <input id="show-metaballs" type="checkbox" checked>
                    <span>Sources</span>
                </label>
            </section>

            <section class="card">
                <h2>Controls</h2>
                <div class="button-grid">
                    <button id="start-button" type="button">Start</button>
                    <button id="stop-button" type="button">Stop</button>
                    <button id="reset-button" type="button">Reset</button>
                    <button id="randomize-button" type="button">Randomize</button>
                    <button id="add-button" type="button">Add random</button>
                    <button id="remove-button" type="button">Remove last</button>
                </div>
            </section>

            <section class="card">
                <h2>Status</h2>
                <div class="status-list">
                    <p>Animation <span id="status-animation">running</span></p>
                    <p>Cells <span id="status-cells">0 x 0</span></p>
                    <p>Metaballs <span id="status-metaballs">5</span></p>
                    <p>Threshold <span id="status-threshold">0.5</span></p>
                    <p>Speed <span id="status-speed">1.0</span></p>
                    <p>Intensity <span id="status-strength">1.5</span></p>
                </div>
            </section>
        </aside>

        <main class="main-panel">
            <div class="canvas-card">
                <div class="canvas-header">
                    <div>
                        <h2>Interactive visualization</h2>
                    </div>
                </div>

                <div id="canvas-stage">
                    <div id="canvas-container"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/metaball.js"></script>
    <script src="js/field.js"></script>
    <script src="js/marchingSquares.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/sketch.js"></script>
</body>

</html>
